<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome Back</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    
    font-family: 'Barlow', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: min(1080px, 98vw);
    min-height: 663px;
    border-radius: 0px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15);
  }

  /* ── LEFT PANEL ── */
  .left {
    background: #ffffff;
    padding: 64px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 900;
    color: #111;
    letter-spacing: -0.5px;
    line-height: 1;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sub {
    font-size: 15px;
    color: #666;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #222;
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    height: 50px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    padding: 0 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    color: #111;
    background: #fafafa;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: #e0283a;
    background: #fff;
  }

  input::placeholder { color: #bbb; }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    margin-top: 4px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #444;
    cursor: pointer;
    user-select: none;
  }

  .remember input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #e0283a;
    cursor: pointer;
  }

  .forgot {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    text-decoration: none;
  }
  .forgot:hover { text-decoration: underline; color: #e0283a; }

  .btn-signin {
    width: 100%;
    height: 52px;
    background: #e0283a;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 14px;
  }
  .btn-signin:hover { background: #c01e2e; }
  .btn-signin:active { transform: scale(0.99); }

  .btn-google {
    width: 100%;
    height: 52px;
    background: #fff;
    color: #333;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
  }
  .btn-google:hover { border-color: #aaa; background: #f9f9f9; }

  .google-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .signup-text {
    font-size: 14px;
    color: #777;
    text-align: center;
  }
  .signup-text a {
    color: #e0283a;
    font-weight: 600;
    text-decoration: none;
  }
  .signup-text a:hover { text-decoration: underline; }

  /* ── RIGHT PANEL ── */
  .right {
    background: #f0eeeb;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  /* Large decorative circular shape behind player */
  .right::before {
    content: '';
    position: absolute;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: rgba(220,220,215,0.6);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%);
  }

  /* Abstract splash shapes */
  .splash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .player-svg {
    position: relative;
    z-index: 2;
    width: 92%;
    max-width: 420px;
    margin-bottom: -4px;
  }

  /* Nike swoosh watermark */
  .swoosh-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.04;
    z-index: 1;
  }

  @media (max-width: 680px) {
    .card { grid-template-columns: 1fr; }
    .right { display: none; }
    .left { padding: 40px 28px; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- LEFT: Login Form -->
  <div class="left">
    <h1 class="headline">Welcome Back</h1>
    <p class="sub">Welcome back! Please enter your details.</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" />
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" />
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password</a>
    </div>

    <button class="btn-signin" onclick="handleSignin()">Sign in</button>

    <button class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <p class="signup-text">Don't have an account? <a href="#">Sign up fo free!</a></p>
  
</div>

<script>
  function handleSignin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) {
      alert('Please enter your email and password.');
      return;
    }
    alert('Signing in...');
  }
</script>





</body>

</html>
